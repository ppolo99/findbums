<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>findbums.com — Coming Soon</title>
  <meta name="description" content="findbums.com is launching soon. Something new is on the way." />

  <!-- Social sharing preview -->
  <meta property="og:title" content="findbums.com — Coming Soon" />
  <meta property="og:description" content="Something new is on the way." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #06070d;
      --text:      #f4f6fb;
      --muted:     #8b92a8;
      --accent-1:  #6d5efc;
      --accent-2:  #18c8ff;
      --accent-3:  #ff5edb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
      padding: 24px;
    }

    /* Animated gradient glow blobs in the background */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      z-index: 0;
      animation: float 18s ease-in-out infinite;
    }
    .blob.one   { width: 520px; height: 520px; background: var(--accent-1); top: -160px; left: -120px; }
    .blob.two   { width: 460px; height: 460px; background: var(--accent-2); bottom: -180px; right: -120px; animation-delay: -6s; }
    .blob.three { width: 380px; height: 380px; background: var(--accent-3); top: 40%; left: 55%; opacity: 0.35; animation-delay: -12s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(40px, -30px) scale(1.08); }
      66%      { transform: translate(-30px, 25px) scale(0.95); }
    }

    /* Subtle grid overlay for a techy feel */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 640px;
      animation: rise 1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      padding: 8px 16px;
      border-radius: 999px;
      margin-bottom: 32px;
      backdrop-filter: blur(8px);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 12px var(--accent-2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 9vw, 5.5rem);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .brand {
      background: linear-gradient(100deg, var(--accent-2), var(--accent-1) 45%, var(--accent-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tld { color: var(--muted); font-weight: 500; }

    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: clamp(1.3rem, 4vw, 2rem);
      margin-top: 18px;
      margin-bottom: 20px;
    }

    p.sub {
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      line-height: 1.6;
      max-width: 460px;
      margin: 0 auto;
    }

    footer {
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      z-index: 2;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    @media (prefers-reduced-motion: reduce) {
      .blob, .dot, .content { animation: none; }
    }
  </style>
</head>
<body>
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>
  <div class="grid-overlay"></div>

  <main class="content">
    <span class="badge"><span class="dot"></span> Coming soon</span>

    <h1><span class="brand">findbums</span><span class="tld">.com</span></h1>

    <p class="tagline">Something new is on the way.</p>

    <p class="sub">
      We're building something worth the wait. Check back soon —
      this is just the beginning.
    </p>
  </main>

  <footer>
    &copy; <span id="year"></span> findbums.com
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
